apiVersion: sonarqube.sonarqube.io/v1alpha1
kind: SonarQubeQualityGate
metadata:
  name: my-quality-gate
  namespace: default
spec:
  instanceRef:
    name: my-sonarqube
  name: my-quality-gate
  isDefault: false
  conditions:
    - metric: coverage
      operator: LT
      value: "80"
    - metric: new_reliability_rating
      operator: GT
      value: "1"
    - metric: new_security_rating
      operator: GT
      value: "1"
