apiVersion: sonarqube.sonarqube.io/v1alpha1
kind: SonarQubeInstance
metadata:
  name: my-sonarqube
  namespace: default
spec:
  edition: community
  version: "10.3"
  database:
    host: my-postgres
    port: 5432
    name: sonarqube
    secretRef: sonar-db-secret
  adminSecretRef: sonar-admin
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2"
  persistence:
    size: "10Gi"
    extensionsSize: "2Gi"
    storageClass: "standard"
  jvmOptions: "-Xmx2g -Xms512m"
  ingress:
    enabled: true
    host: sonarqube.example.com
    ingressClassName: nginx
