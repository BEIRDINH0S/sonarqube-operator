---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: sonarqubebranchrules.sonarqube.sonarqube.io
spec:
  group: sonarqube.sonarqube.io
  names:
    kind: SonarQubeBranchRule
    listKind: SonarQubeBranchRuleList
    plural: sonarqubebranchrules
    singular: sonarqubebranchrule
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.projectKey
      name: Project
      type: string
    - jsonPath: .spec.branch
      name: Branch
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SonarQubeBranchRule is the Schema for the sonarqubebranchrules
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SonarQubeBranchRuleSpec defines per-branch settings for a SonarQube project:
              new-code-period mode, quality gate override, and per-branch sonar.* settings.
            properties:
              branch:
                description: |-
                  branch is the branch name (e.g. "main", "release/1.x"). Immutable — to
                  retarget another branch, create a new BranchRule.
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: spec.branch is immutable after creation
                  rule: self == oldSelf
              instanceRef:
                description: instanceRef references the target SonarQubeInstance.
                properties:
                  name:
                    description: name est le nom de la SonarQubeInstance.
                    minLength: 1
                    type: string
                  namespace:
                    description: 'namespace est le namespace de la SonarQubeInstance.
                      Défaut : même namespace que le plugin.'
                    type: string
                required:
                - name
                type: object
              newCodePeriod:
                description: |-
                  newCodePeriod sets the per-branch new-code reference. Maps to
                  /api/new_code_periods/set.
                properties:
                  mode:
                    description: mode is the new-code-period mode.
                    enum:
                    - previous_version
                    - days
                    - date
                    - reference_branch
                    type: string
                  value:
                    description: |-
                      value depends on mode:
                        - days: integer number of days
                        - date: YYYY-MM-DD
                        - reference_branch: branch name
                        - previous_version: ignored
                    type: string
                required:
                - mode
                type: object
                x-kubernetes-validations:
                - message: spec.newCodePeriod.value is required unless mode is previous_version
                  rule: self.mode == 'previous_version' || (has(self.value) && self.value
                    != '')
              projectKey:
                description: |-
                  projectKey is the SonarQube project key the rule applies to. Should match
                  an existing SonarQubeProject.spec.key in the same instance.
                minLength: 1
                type: string
              qualityGate:
                description: |-
                  qualityGate overrides the project's quality gate for this branch
                  (SonarQube Enterprise+ feature).
                type: string
              settings:
                additionalProperties:
                  type: string
                description: |-
                  settings is a key/value map of branch-scoped sonar.* properties.
                  Reserved auth keys (sonar.auth.*) are rejected at admission.
                type: object
                x-kubernetes-validations:
                - message: sonar.auth.* keys are reserved and cannot be managed via
                    SonarQubeBranchRule
                  rule: self.all(k, !k.startsWith('sonar.auth.'))
            required:
            - branch
            - instanceRef
            - projectKey
            type: object
          status:
            description: SonarQubeBranchRuleStatus defines the observed state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: phase is the current state of the rule.
                enum:
                - Pending
                - Ready
                - Failed
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
