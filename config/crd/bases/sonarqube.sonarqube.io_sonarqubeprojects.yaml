---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: sonarqubeprojects.sonarqube.sonarqube.io
spec:
  group: sonarqube.sonarqube.io
  names:
    kind: SonarQubeProject
    listKind: SonarQubeProjectList
    plural: sonarqubeprojects
    singular: sonarqubeproject
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.instanceRef.name
      name: Instance
      type: string
    - jsonPath: .spec.key
      name: Key
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SonarQubeProject is the Schema for the sonarqubeprojects API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of SonarQubeProject
            properties:
              ciToken:
                description: ciToken configure la génération d'un token CI stocké
                  dans un Secret Kubernetes.
                properties:
                  enabled:
                    default: false
                    description: enabled active la génération du token CI.
                    type: boolean
                  expiresIn:
                    description: |-
                      expiresIn est la durée de vie optionnelle du token.
                      Si défini, le token expirera après cette durée à compter de sa création.
                      Ex. : "720h" (30 jours), "8760h" (1 an).
                      Si non défini, le token n'expire jamais.
                    type: string
                  secretName:
                    description: secretName est le nom du Secret Kubernetes où stocker
                      le token.
                    type: string
                type: object
              instanceRef:
                description: instanceRef référence la SonarQubeInstance cible.
                properties:
                  name:
                    description: name est le nom de la SonarQubeInstance.
                    minLength: 1
                    type: string
                  namespace:
                    description: 'namespace est le namespace de la SonarQubeInstance.
                      Défaut : même namespace que le plugin.'
                    type: string
                required:
                - name
                type: object
              key:
                description: key est l'identifiant unique et IMMUABLE du projet dans
                  SonarQube.
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: spec.key est immuable après création
                  rule: self == oldSelf
              links:
                description: |-
                  links is the list of project links surfaced in the SonarQube UI. The
                  operator manages links it created (tracked in status.managedLinkNames):
                  links added directly via the SonarQube UI are not removed unless their
                  name was previously managed by the operator.
                items:
                  description: |-
                    ProjectLink is a named URL surfaced on a project's overview page.
                    SonarQube derives the link type (homepage, ci, issue, scm, scm_dev, other)
                    from the name automatically — there is no type field in the create API.
                  properties:
                    name:
                      description: name is the display name of the link.
                      minLength: 1
                      type: string
                    url:
                      description: url is the link target.
                      minLength: 1
                      type: string
                  required:
                  - name
                  - url
                  type: object
                type: array
              mainBranch:
                default: main
                description: mainBranch est la branche principale du projet.
                type: string
              name:
                description: name est le nom affiché du projet dans SonarQube.
                minLength: 1
                type: string
              permissions:
                description: |-
                  permissions grants project-scoped permissions to users and/or groups.
                  The operator only ever removes grants it created (tracked in
                  status.managedPermissions); permissions assigned via the SonarQube UI
                  are left alone.
                items:
                  description: |-
                    ProjectPermission grants a set of project permissions to either a user or a group.
                    Exactly one of user / group must be set.
                  properties:
                    group:
                      description: group is the SonarQube group name the permissions
                        apply to.
                      type: string
                    permissions:
                      description: |-
                        permissions is the list of permissions to grant.
                        Valid values: admin, codeviewer, issueadmin, securityhotspotadmin, scan, user.
                      items:
                        type: string
                      minItems: 1
                      type: array
                      x-kubernetes-list-type: set
                    user:
                      description: user is the SonarQube login the permissions apply
                        to.
                      type: string
                  required:
                  - permissions
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of user or group must be set
                    rule: (has(self.user) && size(self.user) > 0) != (has(self.group)
                      && size(self.group) > 0)
                type: array
              qualityGateRef:
                description: qualityGateRef est le nom du SonarQubeQualityGate à associer
                  au projet.
                type: string
              settings:
                additionalProperties:
                  type: string
                description: |-
                  settings is a key/value map of project-scoped sonar.* properties to apply.
                  Keys are propagated to /api/settings/set; entries removed from this map
                  (but previously managed by the operator) are reset via /api/settings/reset.
                  Reserved auth keys (sonar.auth.*) are rejected at admission.
                type: object
                x-kubernetes-validations:
                - message: sonar.auth.* keys are reserved and cannot be managed via
                    SonarQubeProject
                  rule: self.all(k, !k.startsWith('sonar.auth.'))
              tags:
                description: |-
                  tags is the full set of tags to apply to the project. Reconciled with set
                  semantics: SonarQube's tag list is replaced by this list on each reconcile.
                items:
                  type: string
                type: array
              visibility:
                default: private
                description: visibility définit la visibilité du projet.
                enum:
                - private
                - public
                type: string
            required:
            - instanceRef
            - key
            - name
            - visibility
            type: object
          status:
            description: status defines the observed state of SonarQubeProject
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              managedLinkNames:
                description: |-
                  managedLinkNames tracks the names of project links the operator created.
                  Used to decide which links to remove when they leave spec.links — links
                  created directly via the UI are not in this list and stay untouched.
                items:
                  type: string
                type: array
              managedPermissions:
                description: |-
                  managedPermissions tracks the (subjectKind, subject, permission) grants
                  the operator currently owns on the project. Grants in this list that
                  no longer match spec.permissions are removed on the next reconcile.
                  Format: "user:alice:admin", "group:dev-team:scan".
                items:
                  type: string
                type: array
              managedSettings:
                description: |-
                  managedSettings tracks the setting keys the operator currently owns on
                  the project. Keys removed from spec.settings but still in this list are
                  reset on the next reconcile.
                items:
                  type: string
                type: array
              phase:
                description: phase est l'état courant du projet.
                enum:
                - Pending
                - Ready
                - Failed
                type: string
              projectUrl:
                description: projectUrl est l'URL du projet dans l'UI SonarQube.
                type: string
              tokenSecretRef:
                description: tokenSecretRef est le nom du Secret contenant le token
                  CI.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
