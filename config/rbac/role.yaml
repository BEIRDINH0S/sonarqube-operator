---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - sonarqube.sonarqube.io
  resources:
  - sonarqubeinstances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - sonarqube.sonarqube.io
  resources:
  - sonarqubeinstances/finalizers
  verbs:
  - update
- apiGroups:
  - sonarqube.sonarqube.io
  resources:
  - sonarqubeinstances/status
  verbs:
  - get
  - patch
  - update
