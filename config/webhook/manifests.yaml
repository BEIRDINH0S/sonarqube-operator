---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-sonarqube-sonarqube-io-v1alpha1-sonarqubeinstance
  failurePolicy: Ignore
  name: vsonarqubeinstance.kb.io
  rules:
  - apiGroups:
    - sonarqube.sonarqube.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - sonarqubeinstances
  sideEffects: None
