# Prometheus Monitor Service (Metrics)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: sonarqube-operator
    app.kubernetes.io/managed-by: kustomize
  name: controller-manager-metrics-monitor
  namespace: system
spec:
  endpoints:
    - path: /metrics
      port: https # Ensure this is the name of the port that exposes HTTPS metrics
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        # insecureSkipVerify is on by default because the metrics server uses a self-signed cert
        # generated by controller-runtime. For production, deploy cert-manager and apply the patch
        # at config/prometheus/servicemonitor_tls_patch.yaml — it references the 'metrics-server-cert'
        # Secret and disables this flag.
        insecureSkipVerify: true
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: sonarqube-operator
