name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sonarqube-operator
  CHART_NAME: sonarqube-operator
  HELM_VERSION: v3.16.4

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: |
          go mod tidy
          make test

      - name: Run linter
        run: make lint

  image:
    name: Build & push image
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Roadmap requires three tags per stable release: vX.Y.Z, vX.Y, latest.
          # Pre-releases (vX.Y.Z-rc.N, etc.) only get the full version tag —
          # docker/metadata-action skips {{major}}.{{minor}} on pre-releases,
          # and we gate `latest` on the same condition.
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  release:
    name: Package & publish release
    needs: image
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          # GITHUB_REF_NAME is the tag, e.g. v0.5.0. Helm requires plain SemVer
          # for chart versions, so we strip the leading "v".
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # OCI references (image repos, helm push targets) must be lowercase.
          # docker/metadata-action does this implicitly for images, but `helm push`
          # and our kustomize-rendered install.yaml don't — so we normalise here once
          # and reuse downstream.
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME_LC="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "owner=${OWNER_LC}"
            echo "image=${REGISTRY}/${IMAGE_NAME_LC}:${TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate install.yaml
        run: make build-installer IMG=${{ steps.version.outputs.image }}

      - name: Sync chart version with tag
        run: |
          set -euo pipefail
          CHART="charts/${CHART_NAME}/Chart.yaml"
          # Pin both version (chart) and appVersion (operator) to the released tag
          # so a fresh `helm install` defaults to the matching image without --set.
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/"     "$CHART"
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" "$CHART"
          cat "$CHART"

      - name: Sync CRDs into chart
        run: make helm-sync-crds

      - name: Lint chart
        run: |
          helm lint "charts/${CHART_NAME}"
          helm lint "charts/${CHART_NAME}" --set webhook.enabled=true --set metrics.serviceMonitor.enabled=true

      - name: Package chart
        run: |
          mkdir -p dist
          helm package "charts/${CHART_NAME}" --destination dist
          ls -la dist

      - name: Push chart to GHCR (OCI)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login "${REGISTRY}" --username "${{ github.actor }}" --password-stdin
          helm push \
            "dist/${CHART_NAME}-${{ steps.version.outputs.version }}.tgz" \
            "oci://${REGISTRY}/${{ steps.version.outputs.owner }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Mark as pre-release when the SemVer has a "-" (rc.N, beta, alpha…).
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            ${PRERELEASE_FLAG} \
            "dist/install.yaml#kubectl install (CRDs + RBAC + Deployment)" \
            "dist/${CHART_NAME}-${VERSION}.tgz#Helm chart"
