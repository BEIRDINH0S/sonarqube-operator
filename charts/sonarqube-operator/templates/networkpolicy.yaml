{{- if and .Values.metrics.enabled .Values.metrics.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sonarqube-operator.fullname" . }}-allow-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sonarqube-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sonarqube-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              metrics: enabled
      ports:
        - protocol: TCP
          port: {{ .Values.metrics.port }}
{{- end }}
