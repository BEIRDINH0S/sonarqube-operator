{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sonarqube-operator.fullname" . }}-manager
  labels:
    {{- include "sonarqube-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - events
    verbs: [create, patch]
  - apiGroups: [""]
    resources:
      - persistentvolumeclaims
      - secrets
      - services
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [apps]
    resources:
      - statefulsets
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [networking.k8s.io]
    resources:
      - ingresses
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [sonarqube.sonarqube.io]
    resources:
      - sonarqubeinstances
      - sonarqubeplugins
      - sonarqubeprojects
      - sonarqubequalitygates
      - sonarqubeusers
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [sonarqube.sonarqube.io]
    resources:
      - sonarqubeinstances/finalizers
      - sonarqubeplugins/finalizers
      - sonarqubeprojects/finalizers
      - sonarqubequalitygates/finalizers
      - sonarqubeusers/finalizers
    verbs: [update]
  - apiGroups: [sonarqube.sonarqube.io]
    resources:
      - sonarqubeinstances/status
      - sonarqubeplugins/status
      - sonarqubeprojects/status
      - sonarqubequalitygates/status
      - sonarqubeusers/status
    verbs: [get, patch, update]
{{- end }}
