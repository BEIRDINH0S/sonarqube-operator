{{- if .Values.webhook.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sonarqube-operator.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sonarqube-operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: webhook
      port: 443
      protocol: TCP
      targetPort: webhook
  selector:
    {{- include "sonarqube-operator.selectorLabels" . | nindent 4 }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "sonarqube-operator.fullname" . }}
  labels:
    {{- include "sonarqube-operator.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ include "sonarqube-operator.webhook.injectCaFrom" . }}
  {{- end }}
webhooks:
  - name: vsonarqubeinstance.kb.io
    admissionReviewVersions: [v1]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    clientConfig:
      service:
        name: {{ include "sonarqube-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-sonarqube-sonarqube-io-v1alpha1-sonarqubeinstance
      {{- if and (not .Values.webhook.certManager.enabled) .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
    rules:
      - apiGroups: [sonarqube.sonarqube.io]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [sonarqubeinstances]
{{- end }}
