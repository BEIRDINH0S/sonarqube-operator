{{- if and .Values.webhook.enabled .Values.webhook.certManager.enabled -}}
{{- if include "sonarqube-operator.webhook.useSelfSignedIssuer" . }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "sonarqube-operator.webhookIssuerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sonarqube-operator.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "sonarqube-operator.webhookCertificateName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sonarqube-operator.labels" . | nindent 4 }}
spec:
  secretName: {{ include "sonarqube-operator.webhookSecretName" . }}
  duration: {{ .Values.webhook.certManager.duration }}
  renewBefore: {{ .Values.webhook.certManager.renewBefore }}
  dnsNames:
    - {{ include "sonarqube-operator.webhookServiceName" . }}.{{ .Release.Namespace }}.svc
    - {{ include "sonarqube-operator.webhookServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    {{- include "sonarqube-operator.webhook.issuerRef" . | nindent 4 }}
{{- end }}
